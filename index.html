<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Price is Right - Championship Suite v4.0</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(18, 22, 31, 0.85);
            --border-accent: #ffb703;
            --jamaica-green: #009b3a;
            --jamaica-gold: #fed100;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --shadow-glow: rgba(254, 209, 0, 0.25);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #072211 0%, #050508 100%);
            color: var(--text-color);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
            overflow: hidden;
        }
        .game-container { display: grid; grid-template-columns: 1fr 340px; gap: 28px; max-width: 1440px; width: 100%; }
        .canvas-container {
            position: relative; background: #020305; border-radius: 28px; overflow: hidden;
            border: 4px solid var(--jamaica-gold); 
            box-shadow: 0 0 40px var(--shadow-glow), 0 30px 60px -15px rgba(0, 0, 0, 0.95);
        }
        canvas { display: block; width: 100%; height: auto; }
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .panel {
            background-color: var(--panel-bg); backdrop-filter: blur(20px); border-radius: 20px;
            padding: 20px; border: 1px solid rgba(254, 209, 0, 0.15); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; color: var(--jamaica-gold); border-bottom: 2px solid rgba(254, 209, 0, 0.2); padding-bottom: 8px; }
        
        /* New Instructions Box */
        .instructions-box {
            background: rgba(0, 155, 58, 0.1); border-left: 4px solid var(--jamaica-green);
            padding: 12px; font-size: 13px; line-height: 1.5; color: #cbd5e1; border-radius: 4px;
            margin-bottom: 16px;
        }
        .instructions-box strong { color: #fff; }

        .game-selector-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        button {
            background: rgba(255, 255, 255, 0.03); color: var(--text-color); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px; padding: 12px 16px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.3s ease;
        }
        button:hover:not(:disabled) { background: rgba(255, 255, 255, 0.08); border-color: var(--jamaica-gold); transform: translateY(-1px); }
        button.active-game { background: linear-gradient(135deg, var(--jamaica-gold) 0%, #ccaa00 100%); color: #000; border-color: #fff; box-shadow: 0 4px 15px rgba(254, 209, 0, 0.3); }
        .log-box { height: 160px; overflow-y: auto; font-family: ui-monospace, monospace; font-size: 12px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
        .log-entry { line-height: 1.5; padding: 8px 12px; border-radius: 8px; background: rgba(0, 0, 0, 0.4); border-left: 4px solid #64748b; }
        .log-host { color: var(--jamaica-gold); border-left-color: var(--jamaica-gold); font-weight: bold; }
        .log-win { color: #10b981; border-left-color: var(--jamaica-green); font-weight: bold; }
        .log-fail { color: #ef4444; border-left-color: #ef4444; }
        .stat-val { font-size: 32px; font-family: monospace; font-weight: 900; color: var(--jamaica-green); text-shadow: 0 0 10px rgba(0,155,58,0.2); }
        .guess-input {
            width: 100%; background: rgba(0, 0, 0, 0.5); color: var(--jamaica-gold); 
            border: 2px solid #475569; padding: 12px; border-radius: 10px; 
            font-size: 22px; font-weight: bold; font-family: monospace;
            text-align: center; margin-top: 8px; outline: none; transition: all 0.2s;
        }
        .guess-input:focus { border-color: var(--jamaica-gold); box-shadow: 0 0 15px rgba(254, 209, 0, 0.4); }
        .main-action-btn { width: 100%; margin-top: 10px; color: black; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; background: linear-gradient(135deg, var(--jamaica-green) 0%, #00772c 100%); color: white; border: none; }
        .main-action-btn:hover:not(:disabled) { background: linear-gradient(135deg, #00b344 0%, var(--jamaica-green) 100%); box-shadow: 0 6px 20px rgba(0, 155, 58, 0.4); }
    </style>
</head>
<body>
<div class="game-container">
    <div class="canvas-container"><canvas id="studioCanvas" width="1000" height="640"></canvas></div>
    <div class="sidebar">
        <div class="panel">
            <h3>Select Stage</h3>
            <div class="game-selector-grid">
                <button id="navWheel" class="active-game" onclick="switchGameMode('WHEEL')">The Big Wheel</button>
                <button id="navPlinko" onclick="switchGameMode('PLINKO')">Plinko Premium</button>
                <button id="navCliff" onclick="switchGameMode('CLIFF')">Cliff Hangers</button>
            </div>
        </div>
        
        <div class="panel" style="padding: 16px 20px;">
            <h3 id="panelStatsTitle">Wheel Controls</h3>
            
            <!-- Dynamic Instructions Module -->
            <div id="gameInstructions" class="instructions-box">
                <strong>How to Play:</strong> Click and drag up/down on the wheel, or press Spin. Try to get as close to 1.00 as possible without going over in a maximum of two spins!
            </div>

            <div style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
                <div style="font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em;">Bankroll Balance</div>
                <div class="stat-val" id="winningsDisplay" style="font-size: 24px;">$0</div>
            </div>
            
            <div id="interactiveScoreRow" style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px;">
                <div style="font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em;" id="scoreLabelText">Current Score</div>
                <div class="stat-val" id="scoreDisplay" style="color: var(--jamaica-gold); font-size: 24px;">0.00</div>
            </div>
            
            <div id="cliffGuessRow" style="display: none; margin-top: 5px;">
                <div style="font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em;">Enter Price Guess ($)</div>
                <input type="number" id="cliffGuessInput" class="guess-input" placeholder="0" />
            </div>

            <button id="actionBtn" class="main-action-btn" onclick="handleMainAction()">Spin The Wheel!</button>
        </div>

        <div class="panel" style="flex-grow: 1;"><h3>Production Feed</h3><div class="log-box" id="logBox"></div></div>
    </div>
</div>
<script>
    let canvas, ctx, audioCtx = null;
    let currentMode = 'WHEEL', lifetimeWinnings = 0, glowPulseFrame = 0;
    
    let particles = [];
    let activePegGlows = [];

    // --- WHEEL STATE ---
    const WHEEL_VALUES = [0.05, 1.00, 0.15, 0.80, 0.35, 0.70, 0.25, 0.60, 0.45, 0.55, 0.40, 0.65, 0.30, 0.75, 0.20, 0.85, 0.10, 0.95, 0.50, 0.90];
    const TOTAL_SEGMENTS = WHEEL_VALUES.length, SEGMENT_ARC = (Math.PI * 2) / TOTAL_SEGMENTS;
    let wheelAngle = 0, wheelVelocity = 0, spinCount = 0, wheelTotalScore = 0, lastClickIndex = 0, isDragging = false, lastMouseY = 0, dragVelocity = 0;
    
    // --- PLINKO STATE ---
    let plinkoChips = [], plinkoPegs = [], plinkoRemainingDrops = 0;
    const PLINKO_SLOTS = [100, 500, 1000, 0, 10000, 0, 1000, 500, 100], SLOT_WIDTH = 1000 / PLINKO_SLOTS.length;

    // --- CLIFF HANGERS STATE ---
    const CLIFF_ITEMS = [
        { name: "Pro Audio System", actualPrice: 149 },
        { name: "Smart Espresso Maker", actualPrice: 285 },
        { name: "Designer Leather Jacket", actualPrice: 420 }
    ];
    let cliffItemIndex = 0, cliffCurrentStep = 0, cliffTargetStep = 0;
    let cliffGuy = { x: 0, y: 0, vy: 0, angle: 0, falling: false };
    let cliffWalking = false, cliffGameOver = false, lastYodelTime = 0;

    window.onload = function() {
        canvas = document.getElementById('studioCanvas'); ctx = canvas.getContext('2d');
        setupInputTracking(); loadWinningsState(); initBigWheelEngine(); setInterval(studioMainLoop, 1000 / 60);
    };

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function playSound(type) {
        try {
            initAudio(); if (!audioCtx) return;
            let osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            
            if (type === 'click') { 
                osc.type = 'triangle'; osc.frequency.setValueAtTime(140, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }
            else if (type === 'peg') { 
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25 + Math.random() * 300, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.25, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            }
            else if (type === 'win') { 
                [440, 554.37, 659.25, 880].forEach((freq, idx) => {
                    let o = audioCtx.createOscillator(), g = audioCtx.createGain();
                    o.type = 'sawtooth'; o.frequency.setValueAtTime(freq, audioCtx.currentTime + idx*0.08);
                    g.connect(audioCtx.destination); o.connect(g);
                    g.gain.setValueAtTime(0.15, audioCtx.currentTime + idx*0.08); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + idx*0.08 + 0.4);
                    o.start(audioCtx.currentTime + idx*0.08); o.stop(audioCtx.currentTime + idx*0.08 + 0.4);
                });
            }
            else if (type === 'yodel_high' || type === 'yodel_low') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(type === 'yodel_high' ? 587.33 : 392.00, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            }
            else if (type === 'fall') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(350, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 1.6);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 1.6);
                osc.start(); osc.stop(audioCtx.currentTime + 1.6);
            }
        } catch(e) {}
    }

    function spawnParticles(x, y, color) {
        for(let i=0; i<12; i++) {
            particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, radius: Math.random() * 4 + 2, alpha: 1, color: color });
        }
    }

    function switchGameMode(mode) {
        currentMode = mode;
        document.getElementById('navWheel').className = mode === 'WHEEL' ? 'active-game' : '';
        document.getElementById('navPlinko').className = mode === 'PLINKO' ? 'active-game' : '';
        document.getElementById('navCliff').className = mode === 'CLIFF' ? 'active-game' : '';
        
        let scoreRow = document.getElementById('interactiveScoreRow');
        let cliffRow = document.getElementById('cliffGuessRow');
        let instructions = document.getElementById('gameInstructions');

        if (mode === 'WHEEL') { 
            document.getElementById('panelStatsTitle').innerText = "Wheel Controls"; document.getElementById('scoreLabelText').innerText = "Current Score"; 
            document.getElementById('actionBtn').innerText = "Spin The Wheel!"; document.getElementById('actionBtn').disabled = false;
            instructions.innerHTML = "<strong>How to Play:</strong> Click and drag up/down on the wheel, or press Spin. Try to get as close to 1.00 as possible without going over in a maximum of two spins!";
            scoreRow.style.display = 'flex'; cliffRow.style.display = 'none'; initBigWheelEngine(); 
        }
        else if (mode === 'PLINKO') { 
            document.getElementById('panelStatsTitle').innerText = "Plinko Premium Dashboard"; document.getElementById('scoreLabelText').innerText = "Available Chips"; 
            document.getElementById('actionBtn').innerText = "Claim Pricing Chips"; document.getElementById('actionBtn').disabled = false;
            instructions.innerHTML = "<strong>How to Play:</strong> Click anywhere inside the game area near the top of the board to drop your chips. Watch them bounce down into the multipliers below!";
            scoreRow.style.display = 'flex'; cliffRow.style.display = 'none'; initPlinkoEngine(); 
        }
        else if (mode === 'CLIFF') {
            document.getElementById('panelStatsTitle').innerText = "Cliff Hangers Terminal"; 
            document.getElementById('actionBtn').innerText = "Lock In Guess!"; document.getElementById('actionBtn').disabled = false;
            instructions.innerHTML = "<strong>How to Play:</strong> Guess the EXACT price of the item! For every $1 your guess is wrong, the climber takes 1 step up the mountain. If he takes 25 steps, he falls!";
            scoreRow.style.display = 'none'; cliffRow.style.display = 'block'; initCliffEngine();
        }
    }

    function initBigWheelEngine() { wheelAngle = 0; wheelVelocity = 0; spinCount = 0; wheelTotalScore = 0; document.getElementById('scoreDisplay').innerText = "0.00"; logMessage("Host: Welcome to the Big Wheel stage!", "host"); }
    
    function initPlinkoEngine() {
        plinkoChips = []; plinkoPegs = []; plinkoRemainingDrops = 0; document.getElementById('scoreDisplay').innerText = "0";
        activePegGlows = [];
        for (let row = 0; row < 11; row++) { 
            let pegsInRow = row % 2 === 0 ? 9 : 10, startX = row % 2 === 0 ? 65 : 20; 
            for (let col = 0; col < pegsInRow; col++) { 
                plinkoPegs.push({ x: startX + (col * 102), y: 110 + (row * 40), radius: 5, id: `p-${row}-${col}` }); 
            } 
        }
    }
    
    function initCliffEngine() {
        cliffItemIndex = 0; cliffCurrentStep = 0; cliffTargetStep = 0; cliffWalking = false; cliffGameOver = false;
        cliffGuy = { x: 100, y: 550, vy: 0, angle: 0, falling: false };
        document.getElementById('cliffGuessInput').value = "";
        document.getElementById('actionBtn').disabled = false;
        logMessage("Host: Let's see if our mountain climber survives the slope!", "host");
    }

    function handleMainAction() {
        initAudio();
        if (currentMode === 'WHEEL' && wheelVelocity === 0) { 
            wheelVelocity = 0.3 + (Math.random() * 0.25); logMessage("The wheel begins to spin...", "system"); 
        }
        else if (currentMode === 'PLINKO') { 
            plinkoRemainingDrops = 5; document.getElementById('scoreDisplay').innerText = plinkoRemainingDrops; logMessage("Host: 5 Elite Plinko chips distributed!", "host"); 
        }
        else if (currentMode === 'CLIFF') {
            if(cliffWalking || cliffGameOver) return;
            let guess = parseInt(document.getElementById('cliffGuessInput').value);
            if (isNaN(guess)) { logMessage("Error: Enter a real price prediction.", "fail"); return; }
            
            let actual = CLIFF_ITEMS[cliffItemIndex].actualPrice;
            let diff = Math.abs(guess - actual);
            
            logMessage(`Item Cost: $${actual}. You guessed $${guess}. Off by $${diff}!`, "system");
            document.getElementById('actionBtn').disabled = true;
            
            cliffTargetStep = cliffCurrentStep + diff;
            cliffWalking = true;
            document.getElementById('cliffGuessInput').value = '';
        }
    }

    function dropPlinkoChip(clickX) {
        if (plinkoRemainingDrops <= 0) return;
        plinkoRemainingDrops--; document.getElementById('scoreDisplay').innerText = plinkoRemainingDrops;
        plinkoChips.push({ x: Math.max(45, Math.min(955, clickX)), y: 45, vx: (Math.random() - 0.5) * 3, vy: 1, radius: 14 }); playSound('click');
    }

    function processWheelPhysics() {
        if (isDragging) { wheelVelocity = dragVelocity; dragVelocity *= 0.88; } else { wheelAngle += wheelVelocity; wheelVelocity *= 0.990; if (Math.abs(wheelVelocity) < 0.0004 && wheelVelocity !== 0) { wheelVelocity = 0; resolveFinalWheelScore(); } }
        let curClickIdx = Math.floor(wheelAngle / SEGMENT_ARC); if (curClickIdx !== lastClickIndex) { if (Math.abs(wheelVelocity) > 0.008) playSound('click'); lastClickIndex = curClickIdx; }
    }

    function processPlinkoPhysics() {
        activePegGlows = activePegGlows.filter(g => { g.frames--; return g.frames > 0; });
        for (let i = plinkoChips.length - 1; i >= 0; i--) {
            let c = plinkoChips[i]; c.vy += 0.42; c.x += c.vx; c.y += c.vy;
            if (c.x < 20 || c.x > 980) { c.vx *= -0.7; c.x = c.x < 20 ? 20 : 980; }
            
            plinkoPegs.forEach(peg => {
                let dx = c.x - peg.x, dy = c.y - peg.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < c.radius + peg.radius) {
                    playSound('peg'); activePegGlows.push({ id: peg.id, frames: 15 });
                    spawnParticles(peg.x, peg.y, varColor('--jamaica-gold'));
                    let angle = Math.atan2(dy, dx);
                    c.x = peg.x + Math.cos(angle) * (c.radius + peg.radius + 1); 
                    c.y = peg.y + Math.sin(angle) * (c.radius + peg.radius + 1);
                    let speed = Math.sqrt(c.vx*c.vx + c.vy*c.vy); 
                    c.vx = Math.cos(angle) * speed * 0.72 + (Math.random() - 0.5) * 2; 
                    c.vy = Math.sin(angle) * speed * 0.55;
                }
            });
            if (c.y > 545) {
                let slotIdx = Math.max(0, Math.min(PLINKO_SLOTS.length - 1, Math.floor(c.x / SLOT_WIDTH))), prize = PLINKO_SLOTS[slotIdx];
                if (prize > 0) { logMessage(`BOOM! LANDED IN $${prize.toLocaleString()}!`, "win"); playSound('win'); updateWinningsLedger(prize); spawnParticles(c.x, c.y, varColor('--jamaica-green')); } else { logMessage("Bummer, $0 entry point hit.", "fail"); }
                plinkoChips.splice(i, 1);
            }
        }
    }

    function processCliffPhysics() {
        if (!cliffWalking) return;
        if (!cliffGuy.falling) {
            cliffCurrentStep += 0.08; 
            cliffGuy.x = 100 + (cliffCurrentStep * 28);
            cliffGuy.y = 550 + (cliffCurrentStep * -16);

            let now = Date.now();
            if (now - lastYodelTime > 220) { playSound(Math.floor(cliffCurrentStep) % 2 === 0 ? 'yodel_high' : 'yodel_low'); lastYodelTime = now; }

            if (cliffCurrentStep >= cliffTargetStep) {
                cliffCurrentStep = cliffTargetStep;
                cliffGuy.x = 100 + (cliffCurrentStep * 28); cliffGuy.y = 550 + (cliffCurrentStep * -16);
                cliffWalking = false;

                if (cliffCurrentStep <= 25) {
                    cliffItemIndex++;
                    if (cliffItemIndex >= CLIFF_ITEMS.length) { logMessage("JACKPOT! You protected the climber! $25k Bonus!", "win"); updateWinningsLedger(25000); playSound('win'); cliffGameOver = true; } else { document.getElementById('actionBtn').disabled = false; }
                }
            }
            if (cliffCurrentStep > 25) { cliffGuy.falling = true; playSound('fall'); logMessage("CRITICAL DROP: Over the summit! Game Over.", "fail"); }
        } else {
            cliffGuy.x += 2.5; cliffGuy.vy += 0.6; cliffGuy.y += cliffGuy.vy; cliffGuy.angle += 0.15;
            if (cliffGuy.y > 700) { cliffWalking = false; cliffGameOver = true; }
        }
    }

    function resolveFinalWheelScore() {
        let normalized = (wheelAngle % (Math.PI * 2)); if (normalized < 0) normalized += (Math.PI * 2);
        let exactIndex = Math.floor((Math.PI * 1.5 - normalized) / SEGMENT_ARC) % TOTAL_SEGMENTS; if (exactIndex < 0) exactIndex += TOTAL_SEGMENTS;
        let spinValue = WHEEL_VALUES[exactIndex]; spinCount++; wheelTotalScore += spinValue;
        document.getElementById('scoreDisplay').innerText = wheelTotalScore.toFixed(2);
        if (wheelTotalScore === 1.00) { logMessage("PERFECTION! Mega $10,000 Payout!", "win"); playSound('win'); updateWinningsLedger(10000); spinCount = 0; wheelTotalScore = 0; }
        else if (wheelTotalScore > 1.00) { logMessage(`Score of $${wheelTotalScore.toFixed(2)} Exceeded 1.00. BUSTED!`, "fail"); spinCount = 0; wheelTotalScore = 0; }
        else { if (spinCount === 1) { logMessage("Host: Stand on your current values, or risk another spin?", "host"); } else { logMessage(`Final combined evaluation score: $${wheelTotalScore.toFixed(2)}!`, "win"); updateWinningsLedger(wheelTotalScore * 1000); spinCount = 0; wheelTotalScore = 0; } }
    }

    function varColor(variable) { return getComputedStyle(document.documentElement).getPropertyValue(variable).trim(); }

    function studioMainLoop() { 
        glowPulseFrame += 0.06; 
        if (currentMode === 'WHEEL') processWheelPhysics(); else if (currentMode === 'PLINKO') processPlinkoPhysics(); else if (currentMode === 'CLIFF') processCliffPhysics();
        particles.forEach((p, idx) => { p.x += p.vx; p.y += p.vy; p.alpha -= 0.02; if(p.alpha <= 0) particles.splice(idx, 1); });
        renderStudioGraphics(); 
    }

    function renderStudioGraphics() {
        ctx.fillStyle = '#06070a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(0, 155, 58, 0.15)'; ctx.lineWidth = 6; ctx.beginPath(); ctx.arc(500, 340, 315, Math.PI, 0); ctx.stroke();
        for (let a = Math.PI; a <= Math.PI * 2; a += 0.1) { 
            let pulseSize = 4 + Math.sin(glowPulseFrame + a*3) * 1.5;
            ctx.fillStyle = varColor('--jamaica-gold'); ctx.beginPath(); ctx.arc(500 + Math.cos(a)*315, 340 + Math.sin(a)*315, pulseSize, 0, Math.PI*2); ctx.fill(); 
        }
        
        if (currentMode === 'WHEEL') renderBigWheelComponent(); 
        else if (currentMode === 'PLINKO') renderPlinkoComponent();
        else if (currentMode === 'CLIFF') renderCliffComponent();

        particles.forEach(p => { ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); ctx.restore(); });
    }

    function renderBigWheelComponent() {
        let center = { x: 500, y: 760 }, radius = 430; 
        ctx.save(); ctx.translate(center.x, center.y); 
        
        // Realistic Background Rim 
        ctx.beginPath(); ctx.arc(0, 0, radius + 15, 0, Math.PI * 2);
        let rimGrad = ctx.createLinearGradient(-radius, -radius, radius, radius);
        rimGrad.addColorStop(0, '#475569'); rimGrad.addColorStop(0.5, '#1e293b'); rimGrad.addColorStop(1, '#0f172a');
        ctx.fillStyle = rimGrad; ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 4; ctx.stroke();

        ctx.rotate(wheelAngle);

        for (let i = 0; i < TOTAL_SEGMENTS; i++) {
            ctx.save(); ctx.rotate(i * SEGMENT_ARC); let value = WHEEL_VALUES[i];
            
            // Inner gradient giving depth to each panel
            let segGrad = ctx.createLinearGradient(0, 0, radius, 0);
            if (value === 1.00) { segGrad.addColorStop(0, '#b38f00'); segGrad.addColorStop(1, varColor('--jamaica-gold')); } 
            else if (i % 2 === 0) { segGrad.addColorStop(0, '#005921'); segGrad.addColorStop(1, varColor('--jamaica-green')); } 
            else { segGrad.addColorStop(0, '#111318'); segGrad.addColorStop(1, '#2c313c'); }
            
            ctx.fillStyle = segGrad;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, radius, -SEGMENT_ARC / 2, SEGMENT_ARC / 2); ctx.closePath(); ctx.fill();
            
            // Harder borders
            ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(radius, -SEGMENT_ARC / 2); ctx.stroke();
            
            // Drop shadows for heavy text
            ctx.fillStyle = (value === 1.00) ? '#000' : '#fff'; 
            ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
            if (value === 1.00) { ctx.shadowColor = 'rgba(255,255,255,0.4)'; }
            ctx.font = '900 30px "Arial Black", sans-serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
            ctx.fillText(value === 1.00 ? "1.00" : (value * 100).toFixed(0), radius - 45, 0); 
            ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; 
            
            // Realistic Physical Pegs
            ctx.beginPath(); ctx.arc(radius, -SEGMENT_ARC / 2, 6, 0, Math.PI*2);
            let pegGrad = ctx.createRadialGradient(radius-2, (-SEGMENT_ARC / 2)-2, 1, radius, -SEGMENT_ARC / 2, 6);
            pegGrad.addColorStop(0, '#fff'); pegGrad.addColorStop(1, '#94a3b8');
            ctx.fillStyle = pegGrad; ctx.fill();
            ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.stroke();

            ctx.restore();
        }
        ctx.restore(); 
        
        // Render Hovering Flapper
        ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 6;
        ctx.fillStyle = '#ef4444'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(500, 314); ctx.lineTo(480, 260); ctx.lineTo(520, 260); ctx.closePath(); ctx.fill(); ctx.stroke();
        
        // Flapper mounting bolt
        ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.arc(500, 275, 6, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0; ctx.shadowOffsetY = 0; // reset
    }

    function renderPlinkoComponent() {
        plinkoPegs.forEach(peg => {
            let isGlowing = activePegGlows.some(g => g.id === peg.id);
            let radGlow = ctx.createRadialGradient(peg.x, peg.y, 1, peg.x, peg.y, peg.radius*2.5);
            radGlow.addColorStop(0, isGlowing ? '#fff' : varColor('--jamaica-gold'));
            radGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = radGlow; ctx.beginPath(); ctx.arc(peg.x, peg.y, peg.radius * 2.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(peg.x, peg.y, peg.radius, 0, Math.PI*2); ctx.fill();
        });
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; ctx.lineWidth = 4; for (let i = 1; i < PLINKO_SLOTS.length; i++) { ctx.beginPath(); ctx.moveTo(i * SLOT_WIDTH, 490); ctx.lineTo(i * SLOT_WIDTH, 570); ctx.stroke(); }
        ctx.font = 'black 18px monospace'; ctx.textAlign = 'center';
        for (let i = 0; i < PLINKO_SLOTS.length; i++) { let val = PLINKO_SLOTS[i]; ctx.fillStyle = val === 10000 ? varColor('--jamaica-gold') : (val === 0 ? '#ef4444' : varColor('--jamaica-green')); ctx.fillText(val === 0 ? "$0" : `$${val.toLocaleString()}`, (i * SLOT_WIDTH) + SLOT_WIDTH/2, 535); }
        plinkoChips.forEach(c => {
            let chGlow = ctx.createRadialGradient(c.x, c.y, 2, c.x, c.y, c.radius);
            chGlow.addColorStop(0, '#ffffff'); chGlow.addColorStop(0.4, varColor('--jamaica-green')); chGlow.addColorStop(1, '#000000');
            ctx.fillStyle = chGlow; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(c.x, c.y, c.radius, 0, Math.PI*2); ctx.fill(); ctx.stroke(); 
        });
    }

    function renderCliffComponent() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(40, 40, 420, 110);
        ctx.strokeStyle = varColor('--jamaica-gold'); ctx.lineWidth = 2; ctx.strokeRect(40, 40, 420, 110);
        ctx.font = '18px sans-serif'; ctx.textAlign = 'left';
        if (cliffItemIndex < CLIFF_ITEMS.length && !cliffGameOver) {
            ctx.fillStyle = varColor('--jamaica-gold'); ctx.fillText(`Target Phase ${cliffItemIndex + 1} of 3:`, 60, 72);
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 26px sans-serif'; ctx.fillText(CLIFF_ITEMS[cliffItemIndex].name, 60, 110);
        } else {
            ctx.fillStyle = cliffGameOver && cliffCurrentStep <= 25 ? varColor('--jamaica-green') : '#ef4444'; ctx.font = 'bold 32px sans-serif'; ctx.fillText(cliffGameOver && cliffCurrentStep <= 25 ? "SUCCESS CASE" : "FAIL CONDITION", 60, 105);
        }
        ctx.strokeStyle = '#272935'; ctx.lineWidth = 8; ctx.lineJoin = 'round'; ctx.beginPath(); ctx.moveTo(100, 550); ctx.lineTo(800, 150); ctx.lineTo(800, 600); ctx.stroke();
        ctx.strokeStyle = varColor('--jamaica-green'); ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(100, 550); ctx.lineTo(800, 150); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
        for (let i = 0; i <= 25; i += 5) {
            let px = 100 + (i * 28); let py = 550 + (i * -16);
            ctx.beginPath(); ctx.arc(px, py, i===25?6:4, 0, Math.PI*2); ctx.fillStyle = i===25 ? '#ef4444' : varColor('--jamaica-gold'); ctx.fill();
            ctx.fillStyle = '#94a3b8'; ctx.fillText(i, px - 15, py + 22);
        }
        ctx.save(); ctx.translate(cliffGuy.x, cliffGuy.y); ctx.rotate(cliffGuy.angle);
        let legSwing = (!cliffGuy.falling && cliffWalking) ? Math.sin(Date.now() / 40) * 12 : 0;
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-5 + legSwing, 14); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(5 - legSwing, 14); ctx.stroke();
        ctx.fillStyle = varColor('--jamaica-green'); ctx.fillRect(-7, -16, 14, 16);
        ctx.fillStyle = '#fdbaf8'; ctx.beginPath(); ctx.arc(0, -22, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = varColor('--jamaica-gold'); ctx.beginPath(); ctx.moveTo(-9, -26); ctx.lineTo(9, -26); ctx.lineTo(0, -38); ctx.fill(); ctx.restore();
    }

    function setupInputTracking() {
        let handleStart = (y, x) => { initAudio(); if (currentMode === 'WHEEL') { isDragging = true; lastMouseY = y; } else if (currentMode === 'PLINKO') { let r = canvas.getBoundingClientRect(); dropPlinkoChip((x - r.left) * (1000 / r.width)); } };
        let handleMove = (y) => { if (!isDragging || currentMode !== 'WHEEL') return; dragVelocity = (y - lastMouseY) * 0.0025; lastMouseY = y; };
        canvas.addEventListener('mousedown', e => handleStart(e.clientY, e.clientX)); canvas.addEventListener('mousemove', e => handleMove(e.clientY)); window.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('touchstart', e => handleStart(e.touches[0].clientY, e.touches[0].clientX)); canvas.addEventListener('touchmove', e => handleMove(e.touches[0].clientY)); canvas.addEventListener('touchend', () => isDragging = false);
    }
    
    function logMessage(msg, type) { let box = document.getElementById('logBox'); if (!box) return; let entry = document.createElement('div'); entry.className = `log-entry log-${type}`; entry.innerText = msg; box.appendChild(entry); box.scrollTop = box.scrollHeight; }
    function updateWinningsLedger(amount) { lifetimeWinnings += amount; localStorage.setItem('pir_total_winnings', lifetimeWinnings.toString()); document.getElementById('winningsDisplay').innerText = `$${lifetimeWinnings.toLocaleString()}`; }
    function loadWinningsState() { lifetimeWinnings = parseInt(localStorage.getItem('pir_total_winnings') || "0"); document.getElementById('winningsDisplay').innerText = `$${lifetimeWinnings.toLocaleString()}`; }
</script>
